# Monitors
  monitor = eDP-1, highres, 0x0, 1.25
  # monitor = HDMI-A-1,preferred,auto,1.25,mirror,eDP-1

  debug {
      disable_logs = false
  }

# Settings
  general {
      col.inactive_border = 0xff304266
      col.active_border = 0xbb8ab4f8

      resize_on_border = 1
      # extend_border_grab_area = 30
      border_size = 3

      gaps_out = 8
      gaps_in = 5

      snap {
          enabled = true
          window_gap = 20
          monitor_gap = 20
      }
  }

  cursor {
      inactive_timeout = 10
  }

  xwayland {
      force_zero_scaling = true
      # use_nearest_neighbor = false
  }


  group {
      col.border_active          = 0xff9077E7
      col.border_inactive        = 0xff2E2E2F
      col.border_locked_active   = 0xff9077E7
      col.border_locked_inactive = 0xff2E2E2F
      groupbar {
          enabled = 1
          render_titles = 0
          height = 1
          priority = 10
          col.active          = 0xff9077E7
          col.inactive        = 0xffC5C5C5
          col.locked_active   = 0xff9077E7
          col.locked_inactive = 0xffAA4C68
      }
  }

  dwindle {
      preserve_split = 1
  }

  input {
      numlock_by_default = 1
      follow_mouse = 1
      repeat_delay = 200
      repeat_rate = 30

      special_fallthrough = 1

      kb_options = grp:lalt_lshift_toggle,caps:escape_shifted_capslock
      kb_layout = us,ru

      touchpad {
          scroll_factor = 0.3
          natural_scroll = 1
          middle_button_emulation = 1
      }
  }

  gestures {
      workspace_swipe = 1
      workspace_swipe_direction_lock = 0
      workspace_swipe_forever = 0
  }

  binds {
      workspace_back_and_forth = 1
      allow_workspace_cycles = 1
  }

  decoration {
      rounding = 10

      blur {
          enabled = 1
          popups = 0
          new_optimizations = 1
          ignore_opacity = 1
          vibrancy_darkness = 0.5
          brightness = 1
          contrast = 1.5
          passes = 5
          noise = 0
          size = 3
          xray = 1
      }

      shadow {
          enabled = 1
          ignore_window = 1
          render_power = 4
          color_inactive = 0x40000000
          color = 0x60000000
          range = 70
      }

      # drop_shadow = 1
      # shadow_ignore_window = 1
      # shadow_render_power = 4
      # col.shadow_inactive = 0x40000000
      # col.shadow = 0x60000000
      # shadow_range = 70

      fullscreen_opacity = 1.0
      inactive_opacity = 1.0
      active_opacity = 1.0
  }

  animations {
      # bezier = overshot1,0.31,0.75,0.23,1.02  #smoother
      # bezier = overshot2,0.64,0.64,0,1.02     #even smoother
      # bezier = overshot3,0.35,0.3,0,1.05      #faster
      bezier = Aylur, 0.05, 0.9, 0.1, 1.05;
      bezier = fast,0.23,0.94,0.1,1
      bezier = slow,0,0.85,0.3,1
      bezier = smooth, 0.05, 0.9, 0.1, 1.02
      bezier = smooth2,0.13,0.99,0.29,1.05
      bezier = popout,0,0,0.3,1
      bezier = overshot,0.4,1,0.1,1.02
      bezier = overshot5,0.42,0.94,0.1,1.02
      bezier = overshot6,0.23,0.94,0.1,1
      bezier = overshot4,0.4,1,0.1,1.02
      bezier = win11Like,0.8,0.1,0.2,1.05
      bezier = linear, 0.0, 0.0, 1.0, 1.0

      enabled = 1
      animation = border,1,10,default
      animation = fade,1,7, default
      animation = fadeOut,1,2, default
      animation = workspaces,1,4,fast,slide
      animation = specialWorkspace,1,2,fast,slidevert
      animation = windowsIn,1,4,smooth
      animation = windowsMove,1,3,smooth
      animation = windowsOut,1,6,default,popin 80%
      animation = borderangle, 1, 100, linear, loop

      #default
      # animation = windows,1,7,default
      # animation = border,1,10,default
      # animation = fade,1,10,default
      # animation = workspaces,1,6,default
  }

  misc {
      # focus_on_activate = 1
      animate_mouse_windowdragging = 1
      animate_manual_resizes = 1
      key_press_enables_dpms = 1
      swallow_regex = ^(kitty)$
      enable_swallow = 1
      vrr = 2
  }

# Rules
  windowrule   = move 1598 66,   ^(org.gnome.Calculator)$
  windowrulev2 = move 60 96,     class:^(com.github.Aylur.ags)$, title:^(Settings)$
  windowrulev2 = move 1524 450,  class:^(org.gnome.clocks)$
  windowrulev2 = move 1218 66,   title:^(Select a File)$

  windowrulev2 = size 800 494,   floating:1
  windowrulev2 = size 1618 1000, initialclass:^(org.telegram.desktop)$, title:^(Telegram)$
  windowrulev2 = size 400 600,   class:^(protonvpn-app)$, title:^(Proton VPN)$
  windowrulev2 = move 1628 76,   class:^(protonvpn-app)$, title:^(Proton VPN)$
  windowrule   = size 1133 700,  ^(thunar)$
  windowrule   = size 1618 1000, ^(emacs)$
  windowrulev2 = size 440 1124,  class:^(com.github.Aylur.ags)$, title:^(Settings)$
  windowrulev2 = size 494 800,   class:^(org.gnome.clocks)$
  windowrulev2 = size 800 494,   initialclass:^(kitty)$
  windowrulev2 = size 1618 1000, class:^(firefox)$
  windowrulev2 = float,class:(clipse)
  windowrulev2 = size 1000 618,   class:(clipse)
  windowrulev2 = bordersize 1,    initialclass:^(clipse)$
  windowrulev2 = animation popin 80%, initialclass:^(clipse)$

  windowrulev2 = bordercolor rgba(00C9DFFF), title:^(.*Hyprland.*)$
  windowrule   = opacity 1.0 override 0.95 override,^(kitty)$

  windowrulev2 = rounding 10, floating:1

  # windowrule = noblur,^(?!.*(kitty|elegram|macs).*)$

  windowrule = float, ^(viewnior)$
  windowrule = float, ^(nwg-look)$
  windowrule = float, ^(Rofi)$
  windowrule = float, ^(thunar)$
  windowrule = float, ^(org.gnome.Calculator)$
  windowrule = float, ^(org.gnome.clocks)$
  windowrule = float, ^(galculator)$
  windowrule = float, ^(eww)$
  windowrule = float, ^(pavucontrol)$
  windowrule = float, ^(nm-connection-editor)$
  windowrule = float, ^(blueberry.py)$
  windowrule = float, ^(org.gnome.Settings)$
  windowrule = float, ^(org.gnome.design.Palette)$
  windowrule = float, ^(Color Picker)$
  windowrule = float, ^(Network)$
  windowrule = float, ^(xdg-desktop-portal)$
  windowrule = float, ^(xdg-desktop-portal-gnome)$
  windowrule = float, ^(transmission-gtk)$
  windowrule = float, ^(*.exe)$
  windowrule = float, ^(feh)$
  windowrule = float, ^(ags)$
  windowrule = float, ^(com.github.Aylur.ags)$
  windowrule = float, ^(Color Picker)$

  windowrulev2 = float, class:^(kitty-maple1)$, title:^(maple)$
  windowrulev2 = float, class:^(firefox)$, title:^(Picture-in-Picture)$
  windowrulev2 = float, class:^(firefox)$, title:^(Firefox — Sharing Indicator)$
  windowrulev2 = float, class:^(firefox)$, title:^(Extension.*
  windowrulev2 = float, class:^(brave)$,   title:^(Save File)$
  windowrulev2 = float, class:^(brave)$,   title:^(Open File)$
  windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
  windowrulev2 = float, class:^(krita)$
  windowrulev2 = float, title:^(Picture in picture)$
  windowrulev2 = pin,   title:^(Picture in picture)$
  windowrulev2 = float, class:^(org.twosheds.iwgtk)$
  windowrulev2 = float, initialclass:^(org.telegram.desktop)$, title:(.*Mini App.*)
  windowrulev2 = float, initialclass:^(VirtualBox Manager)$
  windowrulev2 = float, class:^(blueman-manager)$
  windowrulev2 = float, class:^(blueberry.py)$
  windowrulev2 = float, class:^(tflexcad.exe)$
  windowrulev2 = float, class:^(BasemarkGPU)$
  windowrulev2 = float, class:^(jamesdsp)$
  windowrulev2 = float, class:^(wlogout)$
  windowrulev2 = float, class:^(geeqie)$
  windowrulev2 = tile,  class:^(neovide)$

  windowrulev2 = move 138 67, class:^(firefox)$, title:^(Firefox — Sharing Indicator)$

  # Shimeji
  windowrule = noborder, com-group_finity-mascot-Main
  windowrule = noshadow, com-group_finity-mascot-Main
  windowrule = nofocus,  com-group_finity-mascot-Main
  windowrule = noblur,   com-group_finity-mascot-Main
  windowrule = float,    com-group_finity-mascot-Main

# Bindings
  $clieditor     = emacsclient --create-frame --tty
  $editor        = emacsclient --create-frame
  $systemMonitor = btop
  $browser       = firefox
  $explorer      = kitty vifm
  $terminal      = kitty

  # clipse
    bind = SUPER, V, exec, kitty -o background_opacity=0.7 -o font_size=13 --class clipse -e zsh -c 'clipse'

  # ags
    bind = SUPERSHIFT,  R,  exec, ags -b hypr -q
    bind = SUPER,       R,  exec, ags -b hypr -t launcher
    bind = , XF86PowerOff,  exec, ags -b hypr -t powermenu
    bind = SUPER,  Escape,  exec, ags -b hypr -t overview

  # smart gaps
    workspace = w[tv1], gapsout:0, gapsin:0
    workspace = f[1], gapsout:0, gapsin:0
    windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
    windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
    windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
    windowrulev2 = rounding 0, floating:0, onworkspace:f[1]

  # pyprland
    # workspace = special:exposed,   gapsin:20,gapsout:250,bordersize:4
    workspace = special:minimized, gapsin:20,gapsout:250,bordersize:4
    workspace = special:1, on-created-empty:[float] telegram-desktop # && hyprctl dispatch focuswindow "org\.telegram\.desktop"
    workspace = special:2, on-created-empty:[float] emacsclient --create-frame # && hyprctl dispatch focuswindow "org\.telegram\.desktop"

    # scratchpads
      bind = SUPER, RETURN, exec, pypr toggle topTerm
        windowrulev2 = float, initialclass:^(topTerm)$
        # windowrulev2 = move 25% -50%, initialclass:^(topTerm)$
        # windowrule = workspace special:scratch_topTerm silent,topTerm
        # windowrule = size 25%  17%, topTerm
      # bind = SUPERSHIFT, RETURN, exec, pypr toggle term2
      #   $dropterm2  = ^(kitty-dropterm2)$
      #   windowrule = float, $dropterm2
      #   # windowrule = pin,   $dropterm
      #   windowrule = workspace special:scratch_term2 silent,$dropterm
      #   windowrule = size 100% 1280px,$dropterm2
      #   windowrule = move 120% 18px,$dropterm2
      # bind = SUPER, N, exec, pypr toggle files
      #   $files     = ^(org.gnome.Nautilus)$
      #   windowrule = float, $files
      #   windowrule = pin,   $files
      #   windowrule = workspace special:scratch_files silent,$files
      #   windowrule = size 800px 1124px,$files
      #   windowrule = move 60px 96px,   $files
      # bind = SUPER, 35, exec, pypr toggle dsp # 35 is a "]" on a keyboard
      #   $dsp       = ^(jamesdsp)$
      #   windowrule = workspace special:scratch_dsp silent,$dsp
      #   windowrule = size 918px 17%, $pavu
      #   windowrule = move 1070px 150%,$pavu
      # bind = SUPER, 34, exec, pypr toggle pavu # 34 is a "[" on a keyboard
      #   $pavu      = ^(pavucontrol)$
      #   windowrule = workspace special:scratch_pavu silent,$pavu
      #   windowrule = size 918px 17%,$pavu
      #   windowrule = move 60px 150%,$pavu
      bind = , XF86Calculator, exec, pypr toggle calc
        # windowrule = workspace special:scratch_calc silent,calc
        # windowrule = move 3000px 0px,calc
        # windowrule = size 1000px 500px,calc

    # toggle_special
      bind = SUPER,      backslash, togglespecialworkspace,   minimized # toggles "minimized" special workspace visibility
      # bind = SUPERSHIFT, backslash, exec, pypr toggle_special minimized # moves window to/from the "minimized" workspace
    # layout_center
    #   bind = SUPER, X, exec, pypr layout_center toggle # toggle the layout

  # Screen capture
    bind =      , XF86Launch4,   exec, ags -b hypr -r 'recorder.start()'
    bind =      , Print,         exec, ags -b hypr -r 'recorder.screenshot()'
    bind = SHIFT, Print,         exec, ags -b hypr -r 'recorder.screenshot(true)'
    bind = CTRL , Print,         exec, wl-ocr

  # Window resizing
    binde = SUPERCTRL, k, resizeactive, 0 -20
    binde = SUPERCTRL, j, resizeactive, 0 20
    binde = SUPERCTRL, l, resizeactive, 20 0
    binde = SUPERCTRL, h, resizeactive, -20 0
    binde = SUPERALT,  k, moveactive, 0 -20
    binde = SUPERALT,  j, moveactive, 0 20
    binde = SUPERALT,  l, moveactive, 20 0
    binde = SUPERALT,  h, moveactive, -20 0

  # Mouse
    bindm  = SUPER, mouse:273, resizewindow
    bindm  = SUPER, mouse:272, movewindow

  # Apps
    bind  = SUPER, XF86AudioMute,  exec, $terminal --single-instance
    bind  = SUPERSHIFT, E,      exec, kitty $clieditor
    bind  = SUPERSHIFT, S,      exec, kitty $systemMonitor
    bind  = SUPER, Z,           exec, hyprlock
    bind  = SUPER, W,           exec, $browser
    bind  = SUPER, C,           exec, $explorer
    bind  = SUPER, E,           exec, $editor
    bind  = SUPER, backspace,   exec, wlogout
    bind  = SUPER, I,           exec, killall hyprsunset
    bind  = SUPER, N,      layoutmsg, orientationnext

  # Hyprland
    bind  = SUPERCTRL,  B, exec, hyprctl keyword general:gaps_in 5 && hyprctl keyword general:gaps_out 8 && hyprctl keyword decoration:drop_shadow 1 && hyprctl keyword decoration:rounding 15 && hyprctl keyword decoration:blur:enabled 1 && hyprctl keyword decoration:drop_shadow 1 && hyprctl keyword animations:enabled 1
    bind  = SUPERALT,   B, exec, hyprctl keyword general:gaps_in 0 && hyprctl keyword general:gaps_out 0 && hyprctl keyword decoration:drop_shadow 0 && hyprctl keyword decoration:rounding 0 && hyprctl keyword decoration:blur:enabled 0 && hyprctl keyword decoration:drop_shadow 0 && hyprctl keyword animations:enabled 0

    bind  = SUPER,      Q, killactive
    bind  = SUPER,      M, exec, hyprctl keyword general:layout master
    bind  = SUPER,      D, exec, hyprctl keyword general:layout dwindle
    bind  = SUPER,      RETURN, layoutmsg, swapwithmaster
    bind  = SUPER,      Tab, cyclenext,
    bind  = SUPER,      Tab, bringactivetotop,
    bind  = SUPERSHIFT, Tab, cyclenext, prev
    bind  = SUPERSHIFT, Tab, bringactivetotop,
    binde = ALTCTRL,    h, splitratio, -0.04
    binde = ALTCTRL,    l, splitratio, +0.04

    bind  = SUPER,      P,                     pseudo
    bind  = SUPERSHIFT, P,     workspaceopt,   allpseudo
    bind  = SUPER,      Space, togglefloating, active
    bind  = SUPERSHIFT, Space, workspaceopt,   allfloat

    bind  = SUPER,      mouse_down, workspace, e+1
    bind  = SUPER,      mouse_up,   workspace, e-1
    binde = SUPER,      right,      workspace, e+1
    binde = SUPER,      left,       workspace, e-1

    binde = SUPER,      F, fullscreen, 1
    binde = SUPERSHIFT, F, fullscreen, 0
    bind  = SUPER,      S, togglesplit

    # bind  = SUPERSHIFT, R, exec, hyprctl reload
    bind  = SUPERSHIFT, Q, exec, hyprctl kill
    bind  = CTRLALT,    Delete, exit

  # Laptop
    bindle = , XF86MonBrightnessUp,     exec, brightnessctl set +5%
    bindle = , XF86MonBrightnessDown,   exec, brightnessctl set 5%-

    bindle = , XF86AudioRaiseVolume,    exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
    bindle = , XF86AudioLowerVolume,    exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

    bindl  = , XF86AudioPlay,           exec, playerctl play-pause
    bindl  = , XF86AudioStop,           exec, playerctl stop
    bindl  = , XF86AudioPrev,           exec, playerctl previous
    bindl  = , XF86AudioNext,           exec, playerctl next
    bindl  = , XF86AudioMicMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
    bindl  = , XF86AudioMute,           exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
    bind   = , XF86Favorites,                 togglespecialworkspace, 1
    bind   = ALTCTRL, TAB,                    togglespecialworkspace, 2

  # Workspaces
    bind = SUPERSHIFT, 1, movetoworkspacesilent, 1
    bind = SUPERSHIFT, 2, movetoworkspacesilent, 2
    bind = SUPERSHIFT, 3, movetoworkspacesilent, 3
    bind = SUPERSHIFT, 4, movetoworkspacesilent, 4
    bind = SUPERSHIFT, 5, movetoworkspacesilent, 5
    bind = SUPERSHIFT, 6, movetoworkspacesilent, 6
    bind = SUPERSHIFT, 7, movetoworkspacesilent, 7
    bind = SUPERSHIFT, 8, movetoworkspacesilent, 8
    bind = SUPERSHIFT, 9, movetoworkspacesilent, 9

    bind = SUPERSHIFT, XF86AudioMute,        movetoworkspace, special:1
    bind = SUPERSHIFT, XF86AudioLowerVolume, movetoworkspace, special:2
    bind = SUPERALT, 1, movetoworkspace, 1
    bind = SUPERALT, 2, movetoworkspace, 2
    bind = SUPERALT, 3, movetoworkspace, 3
    bind = SUPERALT, 4, movetoworkspace, 4
    bind = SUPERALT, 5, movetoworkspace, 5
    bind = SUPERALT, 6, movetoworkspace, 6
    bind = SUPERALT, 7, movetoworkspace, 7
    bind = SUPERALT, 8, movetoworkspace, 8
    bind = SUPERALT, 9, movetoworkspace, 9

    bind = SUPER, 0, togglespecialworkspace, 1
    bind = SUPER, 1, workspace, 1
    bind = SUPER, 2, workspace, 2
    bind = SUPER, 3, workspace, 3
    bind = SUPER, 4, workspace, 4
    bind = SUPER, 5, workspace, 5
    bind = SUPER, 6, workspace, 6
    bind = SUPER, 7, workspace, 7
    bind = SUPER, 8, workspace, 8
    bind = SUPER, 9, workspace, 9

  # Movement
    bind = SUPERSHIFT, h, swapwindow, l
    bind = SUPERSHIFT, l, swapwindow, r
    bind = SUPERSHIFT, k, swapwindow, u
    bind = SUPERSHIFT, j, swapwindow, d

  # Focus
    bind = SUPER, h, movefocus, l
    bind = SUPER, l, movefocus, r
    bind = SUPER, k, movefocus, u
    bind = SUPER, j, movefocus, d

    # bind = SUPER, h, exec, pypr layout_center prev
    # bind = SUPER, l, exec, pypr layout_center next
    # bind = SUPER, k, exec, pypr layout_center prev2
    # bind = SUPER, j, exec, pypr layout_center next2


# Environment
  env = XCURSOR_THEME,    GoogleDot-Black
  env = XCURSOR_SIZE,     24
  env = HYPRCURSOR_THEME, Bibata-Modern-Classic
  env = HYPRCURSOR_SIZE,  24

  env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
  env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
  env = QT_QPA_PLATFORM, wayland;xcb
  env = QT_QPA_PLATFORMTHEME, qt5ct

  env = GDK_SCALE,2
  env = GDK_BACKEND, wayland,x11
  env = CLUTTER_BACKEND, wayland
  env = LIBSEAT_BACKEND, logind

  env = _JAVA_AWT_WM_NONREPARENTING, 1
  env = MOZ_DISABLE_RDD_SANDBOX, 1
  env = MOZ_ENABLE_WAYLAND, 1

  env = XDG_SESSION_DESKTOP, Hyprland
  env = XDG_CURRENT_DESKTOP, Hyprland
  env = XDG_SESSION_TYPE, wayland

  env = SDL_VIDEODRIVER, wayland

  # env = LIBVA_DRIVER_NAME, nvidia
  # env = GBM_BACKEND, nvidia-drm
  # env = __GLX_VENDOR_LIBRARY_NAME, nvidia

  env = EGL_PLATFORM, wayland
  env = WLR_BACKEND, vulkan
  env = WLR_NO_HARDWARE_CURSORS, 1
  env = WLR_DRM_NO_MODIFIERS, 1

  env = SWWW_TRANSITION_FPS, 60

  bind = SUPER,       g,   togglegroup

  # bind = CTRL,       l,   lockactivegroup, toggle
  # bind = CTRLSHIFT,  l,   lockgroups,      toggle

  binde = CTRL,       Tab, changegroupactive, f
  binde = CTRLSHIFT,  Tab, changegroupactive, b

  bind = SUPERALT,   h, movewindoworgroup, l
  bind = SUPERALT,   j, movewindoworgroup, d
  bind = SUPERALT,   k, movewindoworgroup, u
  bind = SUPERALT,   l, movewindoworgroup, r

# Plugins
  plugin {
      hyprexpo {
          columns = 3
          gap_size = 15
          bg_col = rgb(111111)
          workspace_method = center curent # [center/first] [workspace] e.g. first 1 or center m+1

          enable_gesture = false # laptop touchpad, 4 fingers
          gesture_distance = 300 # how far is the "max"
          gesture_positive = true # positive = swipe down. Negative = swipe up.
      }
      overview {
          overrideAnimSpeed = 2.5
          exitOnSwitch = 1
          # showSpecialWorkspace = 1
          panelHeight = 200
          # workspaceBorderSize = 2
          # overrideGaps = 10

          # panelColor = rgba(33333377)
          workspaceActiveBorder = 0xbb8ab4f8
      }
  }
  # bind = SUPER, XF86AudioLowerVolume, overview:toggle
  # bind = SUPER, XF86AudioRaiseVolume, hyprexpo:expo, toggle

  plugin {
    hyprbars {
      bar_height    = 18
      bar_text_size = 14
      bar_text_font = Inter Nerd Font Propo
      col.text      = rgba(E4E4E4AA)
      # bar_color     = rgba(59463fAA)
      bar_part_of_window         = true
      bar_precedence_over_border = false
      bar_buttons_alignment      = left
      bar_padding        = 18
      bar_button_padding = 10
      hyprbars-button = rgb(ff7f7f), 10, , hyprctl dispatch killactive
      hyprbars-button = rgb(e4b53f), 10, , hyprctl dispatch fullscreen 1
      hyprbars-button = rgb(a0d26f), 10, , hyprctl dispatch togglefloating

      windowrulev2 = plugin:hyprbars:nobar, focus:0
      windowrulev2 = plugin:hyprbars:nobar, floating:0
      windowrulev2 = plugin:hyprbars:nobar, class:^(.*Term|pavucontrol|jamesdsp|org.gnome.Nautilus)$
    }
  }
