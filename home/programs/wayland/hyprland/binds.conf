# =============================================================================
# HYPRLAND KEYBINDINGS CONFIGURATION
# =============================================================================

exec = hyprctl dispatch submap global
submap = global

# APPLICATION DEFINITIONS
$clieditor = emacsclient --create-frame --tty
$editor = emacsclient --create-frame
$systemMonitor = btop
$browser = firefox
$explorer = kitty vifm
$terminal = kitty

# =============================================================================
# REGULAR BINDINGS (bind)
# =============================================================================

# Clipse (Clipboard Manager)
bind = SUPER, V, exec, kitty -o background_opacity=0.7 -o font_size=13 --class clipse -e zsh -c 'clipse'

# Scratchpads
bind = SUPER, RETURN, exec, pypr toggle topTerm
# bind = , XF86Calculator, exec, pypr toggle calc

# Screen Capture
bind = , Print, exec, grim -g "$(slurp)" - | tee /tmp/screenshot.png | wl-copy && notify-send -i /tmp/screenshot.png "Screenshot" "Area screenshot copied to clipboard"
bind = SHIFT, Print, exec, grim - | tee /tmp/screenshot.png | wl-copy && notify-send -i /tmp/screenshot.png "Screenshot" "Full screen screenshot copied to clipboard"
bind = CTRL, Print, exec, wl-ocr

# Application Launchers
bind = SUPER, XF86AudioMute, exec, $terminal --single-instance
bind = SUPERSHIFT, E, exec, kitty $clieditor
bind = SUPERSHIFT, S, exec, kitty $systemMonitor
bind = SUPER, Z, exec, hyprlock
bind = SUPER, W, exec, $browser
bind = SUPER, C, exec, $explorer
bind = SUPER, E, exec, $editor
bind = SUPER, backspace, exec, wlogout
bind = SUPER, I, exec, killall hyprsunset
bind = SUPER, N, layoutmsg, orientationnext
# bind = SUPER, R, exec, astal-launcher
# bind = SUPER, Escape, exec, astal-powermenu
# bind = ALT, Print, exec, astal-screenrecord

# Hyprland Controls
bind = SUPERCTRL, B, exec, hyprctl keyword general:gaps_in 5 && hyprctl keyword general:gaps_out 8 && hyprctl keyword decoration:drop_shadow 1 && hyprctl keyword decoration:rounding 15 && hyprctl keyword decoration:blur:enabled 1 && hyprctl keyword decoration:drop_shadow 1 && hyprctl keyword animations:enabled 1
bind = SUPERALT, B, exec, hyprctl keyword general:gaps_in 0 && hyprctl keyword general:gaps_out 0 && hyprctl keyword decoration:drop_shadow 0 && hyprctl keyword decoration:rounding 0 && hyprctl keyword decoration:blur:enabled 0 && hyprctl keyword decoration:drop_shadow 0 && hyprctl keyword animations:enabled 0

bind = SUPER, Q, killactive
bind = SUPER, M, exec, hyprctl keyword general:layout master
bind = SUPER, D, exec, hyprctl keyword general:layout dwindle
# bind = SUPER, RETURN, layoutmsg, swapwithmaster
bind = SUPER, Tab, cyclenext,
bind = SUPER, Tab, bringactivetotop,
bind = SUPERSHIFT, Tab, cyclenext, prev
bind = SUPERSHIFT, Tab, bringactivetotop,

bind = SUPER, P, pseudo
bind = SUPERSHIFT, P, workspaceopt, allpseudo
bind = SUPER, Space, togglefloating, active
bind = SUPERSHIFT, Space, workspaceopt, allfloat

bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

bind = SUPER, S, togglesplit

bind = SUPERSHIFT, Q, exec, hyprctl kill

# Workspace Management
bind = SUPERSHIFT, 1, movetoworkspacesilent, 1
bind = SUPERSHIFT, 2, movetoworkspacesilent, 2
bind = SUPERSHIFT, 3, movetoworkspacesilent, 3
bind = SUPERSHIFT, 4, movetoworkspacesilent, 4
bind = SUPERSHIFT, 5, movetoworkspacesilent, 5
bind = SUPERSHIFT, 6, movetoworkspacesilent, 6
bind = SUPERSHIFT, 7, movetoworkspacesilent, 7
bind = SUPERSHIFT, 8, movetoworkspacesilent, 8
bind = SUPERSHIFT, 9, movetoworkspacesilent, 9

bind = SUPERSHIFT, XF86AudioMute, movetoworkspace, special:1
bind = SUPERSHIFT, XF86AudioLowerVolume, movetoworkspace, special:2
bind = SUPERALT, 1, movetoworkspace, 1
bind = SUPERALT, 2, movetoworkspace, 2
bind = SUPERALT, 3, movetoworkspace, 3
bind = SUPERALT, 4, movetoworkspace, 4
bind = SUPERALT, 5, movetoworkspace, 5
bind = SUPERALT, 6, movetoworkspace, 6
bind = SUPERALT, 7, movetoworkspace, 7
bind = SUPERALT, 8, movetoworkspace, 8
bind = SUPERALT, 9, movetoworkspace, 9

bind = SUPER, 0, togglespecialworkspace, 1
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

# Window Movement
bind = SUPERSHIFT, h, swapwindow, l
bind = SUPERSHIFT, l, swapwindow, r
bind = SUPERSHIFT, k, swapwindow, u
bind = SUPERSHIFT, j, swapwindow, d

# Focus Controls
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

# Window Grouping
bind = SUPER, g, togglegroup
bind = SUPERALT, h, movewindoworgroup, l
bind = SUPERALT, j, movewindoworgroup, d
bind = SUPERALT, k, movewindoworgroup, u
bind = SUPERALT, l, movewindoworgroup, r

# =============================================================================
# REPEATING BINDINGS (binde)
# =============================================================================

# Window Resizing
binde = SUPERCTRL, k, resizeactive, 0 -20
binde = SUPERCTRL, j, resizeactive, 0 20
binde = SUPERCTRL, l, resizeactive, 20 0
binde = SUPERCTRL, h, resizeactive, -20 0
binde = SUPERALT, k, moveactive, 0 -20
binde = SUPERALT, j, moveactive, 0 20
binde = SUPERALT, l, moveactive, 20 0
binde = SUPERALT, h, moveactive, -20 0
binde = ALTCTRL, h, splitratio, -0.04
binde = ALTCTRL, l, splitratio, +0.04
binde = SUPER, right, workspace, e+1
binde = SUPER, left, workspace, e-1
binde = SUPER, F, fullscreen, 1
binde = SUPERSHIFT, F, fullscreen, 0
binde = CTRL, Tab, changegroupactive, f
binde = CTRLSHIFT, Tab, changegroupactive, b

# =============================================================================
# MOUSE BINDINGS (bindm)
# =============================================================================

# Mouse Controls
bindm = SUPER, mouse:273, resizewindow
bindm = SUPER, mouse:272, movewindow

# =============================================================================
# RELEASE BINDINGS (bindl)
# =============================================================================

# Media Controls
# bindl = , XF86AudioPlay, exec, playerctl play-pause
# bindl = , XF86AudioStop, exec, playerctl stop
# bindl = , XF86AudioPrev, exec, playerctl previous
# bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Laptop Controls
# bindl = , XF86MonBrightnessUp, exec, brightnessctl set +5%
# bindl = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86Favorites, togglespecialworkspace, 1
bindl = ALTCTRL, TAB, togglespecialworkspace, 2














# ## Shell keybinds
# Launcher
bind  = Super, R, global, caelestia:launcher
bindin = Super, catchall, global, caelestia:launcherInterrupt
bindin = Super, mouse:272, global, caelestia:launcherInterrupt
bindin = Super, mouse:273, global, caelestia:launcherInterrupt
bindin = Super, mouse:274, global, caelestia:launcherInterrupt
bindin = Super, mouse:275, global, caelestia:launcherInterrupt
bindin = Super, mouse:276, global, caelestia:launcherInterrupt
bindin = Super, mouse:277, global, caelestia:launcherInterrupt
bindin = Super, mouse_up, global, caelestia:launcherInterrupt
bindin = Super, mouse_down, global, caelestia:launcherInterrupt

# Misc
bind = Ctrl+Alt, Delete, global, caelestia:session
bindl = Ctrl+Alt, C, global, caelestia:clearNotifs
bind = Super, K, global, caelestia:showall
bind = Super, L, global, caelestia:lock

# Restore lock
bindl = Super+Alt, L, exec, caelestia shell -d
bindl = Super+Alt, L, global, caelestia:lock

# Brightness
bindl = , XF86MonBrightnessUp, global, caelestia:brightnessUp
bindl = , XF86MonBrightnessDown, global, caelestia:brightnessDown

# Media
bind = Alt+Super , Space, togglespecialworkspace, 1
bind = Ctrl+Super, Space, togglespecialworkspace, 2
bindl = , XF86AudioPlay, global, caelestia:mediaToggle
bindl = , XF86AudioPause, global, caelestia:mediaToggle
bindl = , XF86AudioNext, global, caelestia:mediaNext
bindl = , XF86AudioPrev, global, caelestia:mediaPrev
bindl = , XF86AudioStop, global, caelestia:mediaStop
