decoration {
        rounding = 15
        rounding_power = 4.0

    blur {
        size = 7
        passes = 4
        contrast = 0.8
        vibrancy = 0.2
        vibrancy_darkness = 0.2
        popups = 1
    }

    shadow {
        # range = 5
        # render_power = 3
        # color = rgba($outlined4)

        # MacOS-like settings: Soft, diffused shadow with downward offset
        range = 25        # Spread/blur radius for a soft, broad shadow (adjust 20-30 for more/less diffusion)
        render_power = 2  # Intensity (1-3; 2 for subtle blur without sharpness)
        color = rgba(00000055)  # Dark shadow color with low opacity (55 hex = ~33% alpha; increase to 80-90 for stronger)
        color_inactive = rgba(00000025)
        offset = 0 0     # Vertical drop shadow (x=0 for centered, y=12 for moderate elevation; try 8-15)
        scale = 1.0       # Full scale for proportional shadow size
    }

    # Dim inactive windows
    dim_inactive = true
    dim_strength = 0.1
}

general {
    # Gaps and border
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    col.active_border = rgb($onSurfaceVariant)
    col.inactive_border = rgba($onSurfaceVariant94)
}

# Pinned windows border
windowrule = bordercolor rgb($primary) rgba($primary94), pinned:1
windowrule = bordersize 2, pinned:1

# Border for windows on special workspaces
workspace = s[true], bordersize:2

misc {
    background_color = rgba(FFC0CBFF)
}

# Transparency for not fullscreen windows
windowrule = opacity 0.93 override, fullscreen:0
windowrule = opacity 1.0 override, fullscreen:0, class:emacs|kitty|topTerm
